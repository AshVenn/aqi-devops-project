server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    # The Resolver is required when using variables in proxy_pass
    # 10.43.0.10 is the default K3s CoreDNS IP
    resolver 10.43.0.10 valid=30s;

    # Using a variable forces Nginx to resolve the DNS at runtime.
    # This prevents the [emerg] crash if the backend isn't ready at startup.
    set $backend_url http://backend.aqi.svc.cluster.local:8000;

    proxy_pass $backend_url/;
    proxy_http_version 1.1;

    # Timeouts to handle slow model loading on t3.micro
    proxy_connect_timeout       300s;
    proxy_send_timeout          300s;
    proxy_read_timeout          300s;
    send_timeout                300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
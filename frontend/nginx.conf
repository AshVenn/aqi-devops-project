server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
      resolver 10.43.0.10 valid=30s;
      set $backend_url http://backend.aqi.svc.cluster.local:8000;

      # Remove the trailing slash here to let the request flow naturally
      proxy_pass $backend_url;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Critical: Ensure Nginx doesn't try to buffer the large ML response
      proxy_buffering off;
    }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  test-backend:
    name: Test backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        working-directory: ./backend
        run: pytest tests

  test-frontend:
    name: Test frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm run test

  backend:
    name: Build and deploy backend
    needs:
      - changes
      - test-backend
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE: ${{ secrets.DOCKER_USER }}/aqi-backend:latest
      KUBECONFIG: /tmp/kubeconfig
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE" ./backend

      - name: Push backend image
        run: docker push "$BACKEND_IMAGE"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          printf '%s' "$KUBE_CONFIG_DATA" > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: Update backend deployment
        run: |
          kubectl set image deployment/aqi-backend backend="$BACKEND_IMAGE" -n aqi
          kubectl rollout restart deployment/aqi-backend -n aqi
          kubectl rollout status deployment/aqi-backend -n aqi

  frontend:
    name: Build and deploy frontend
    needs:
      - changes
      - test-frontend
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      FRONTEND_IMAGE: ${{ secrets.DOCKER_USER }}/aqi-frontend:latest
      KUBECONFIG: /tmp/kubeconfig
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build frontend image
        run: docker build -t "$FRONTEND_IMAGE" ./frontend

      - name: Push frontend image
        run: docker push "$FRONTEND_IMAGE"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          printf '%s' "$KUBE_CONFIG_DATA" > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: Update frontend deployment
        run: |
          kubectl set image deployment/aqi-frontend frontend="$FRONTEND_IMAGE" -n aqi
          kubectl rollout restart deployment/aqi-frontend -n aqi
          kubectl rollout status deployment/aqi-frontend -n aqi
